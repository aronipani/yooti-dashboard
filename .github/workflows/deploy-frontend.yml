name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/dashboard/**'
      - 'scripts/deploy-frontend.sh'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: frontend/dashboard
        run: npm ci

      - name: Run tests
        working-directory: frontend/dashboard
        run: npx vitest run

      - name: Build
        working-directory: frontend/dashboard
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets to S3 (long cache)
        run: |
          aws s3 sync frontend/dashboard/dist/assets/ \
            s3://${{ secrets.S3_BUCKET }}/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync root files to S3 (no cache)
        run: |
          aws s3 sync frontend/dashboard/dist/ \
            s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
