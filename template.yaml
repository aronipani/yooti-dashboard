AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: yooti-dashboard — generated by Yooti

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12
    Architectures: [arm64]
    Environment:
      Variables:
        LOG_LEVEL: INFO
        AWS_ACCOUNT_ID: !Ref AWS::AccountId
        TABLE_NAME: !Ref MainTable


Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:

  # ── Lambda Functions ────────────────────────────────────────────────────────

  CreateItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-dashboard-create-item-${Environment}"
      CodeUri: src/
      Handler: handlers.create_item.handler
      Events:
        Api:
          Type: Api
          Properties:
            Path: /items
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable



  # ── DynamoDB ────────────────────────────────────────────────────────────────

  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "yooti-dashboard-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true



Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.us-east-1.amazonaws.com/Prod/"
  TableName:
    Value: !Ref MainTable

