AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  yooti-dashboard — Metrics dashboard for Yooti pipeline.
  Six Lambda functions behind API Gateway, single DynamoDB table.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures: [arm64]
    Environment:
      Variables:
        LOG_LEVEL: INFO
        TABLE_NAME: !Ref MetricsTable

Parameters:
  Stage:
    Type: String
    Default: local
    AllowedValues:
      - local
      - staging
      - prod

Resources:

  # ── DynamoDB ─────────────────────────────────────────────

  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "yooti-metrics-${Stage}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: GSI-1
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── API Gateway ──────────────────────────────────────────

  MetricsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      Cors:
        AllowOrigin: "'http://localhost:5173'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowMethods: "'GET,POST,OPTIONS'"

  # ── Lambda Functions ─────────────────────────────────────

  GetCurrentMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-get-current-metrics-${Stage}"
      CodeUri: services/api_python/
      Handler: src.handlers.get_current_metrics.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
      Events:
        GetCurrent:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/current
            Method: get

  GetSprintListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-get-sprint-list-${Stage}"
      CodeUri: services/api_python/
      Handler: src.handlers.get_sprint_list.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
      Events:
        GetSprints:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/sprints
            Method: get

  GetSprintDetailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-get-sprint-detail-${Stage}"
      CodeUri: services/api_python/
      Handler: src.handlers.get_sprint_detail.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
      Events:
        GetSprintDetail:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/sprint/{sprint_num}
            Method: get

  GetTrendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-get-trends-${Stage}"
      CodeUri: services/api_python/
      Handler: src.handlers.get_trends.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
      Events:
        GetTrends:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/trends
            Method: get

  GetStoryDetailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-get-story-detail-${Stage}"
      CodeUri: services/api_python/
      Handler: src.handlers.get_story_detail.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
      Events:
        GetStoryDetail:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/story/{story_id}
            Method: get

  IngestMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "yooti-ingest-metrics-${Stage}"
      CodeUri: services/api_python/
      Handler: src.handlers.ingest_metrics.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MetricsTable
      Events:
        PostIngest:
          Type: Api
          Properties:
            RestApiId: !Ref MetricsApi
            Path: /metrics/ingest
            Method: post

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${MetricsApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  TableName:
    Description: DynamoDB table name
    Value: !Ref MetricsTable
